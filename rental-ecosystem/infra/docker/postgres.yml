version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rental-ecosystem-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rental_ecosystem
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rental-network

volumes:
  postgres_data:
    driver: local

networks:
  rental-network:
    driver: bridge